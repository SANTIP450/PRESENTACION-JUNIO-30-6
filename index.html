<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Facturación Aranceles MS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --navy:#0B1F3A; --navy2:#0F2A4D; --navy3:#142F57; --border:#1E3A63;
  --txt:#E6EEF8; --txt-dim:#93A6C4; --green:#22C55E; --red:#EF4444;
  --c-caucion:#00B4D8; --c-futuro:#F4A100; --c-acc:#A855F7; --c-cheq:#EC4899; --c-acdi:#F97316; --c-va:#22C55E; --c-otros:#94A3B8;
}
*{box-sizing:border-box;}
body{margin:0;font-family:'Segoe UI',Roboto,Arial,sans-serif;background:var(--navy);color:var(--txt);}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:6px;}
::-webkit-scrollbar-track{background:var(--navy2);}

#app{display:flex;min-height:100vh;}
#sidebar{
  width:230px;flex-shrink:0;background:var(--navy2);border-right:1px solid var(--border);
  position:fixed;top:0;left:0;bottom:0;overflow-y:auto;padding:18px 0;z-index:50;
}
#sidebar h1{font-size:15px;padding:0 18px 14px;margin:0 0 10px;border-bottom:1px solid var(--border);color:#fff;}
#sidebar h1 span{display:block;font-size:11px;color:var(--txt-dim);font-weight:400;margin-top:3px;}
.navitem{display:flex;align-items:center;gap:10px;padding:11px 18px;cursor:pointer;color:var(--txt-dim);font-size:13.5px;border-left:3px solid transparent;transition:.15s;}
.navitem:hover{background:rgba(255,255,255,.04);color:var(--txt);}
.navitem.active{background:rgba(34,197,94,.08);color:#fff;border-left-color:var(--green);font-weight:600;}
.navitem .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.navgroup-label{padding:14px 18px 6px;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:#5C7299;}

#main{margin-left:230px;flex:1;padding:24px 28px 60px;max-width:1500px;}
.tabpanel{display:none;}
.tabpanel.active{display:block;animation:fadein .2s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

h2.section-title{font-size:20px;margin:28px 0 14px;color:#fff;display:flex;align-items:center;gap:10px;}
h2.section-title:first-child{margin-top:0;}
h3.subtitle{font-size:14px;color:var(--txt-dim);margin:22px 0 10px;text-transform:uppercase;letter-spacing:.04em;}

.grid{display:grid;gap:14px;}
.grid-2{grid-template-columns:repeat(2,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-5{grid-template-columns:repeat(5,1fr);}
.grid-6{grid-template-columns:repeat(6,1fr);}
@media(max-width:1200px){.grid-4,.grid-5,.grid-6{grid-template-columns:repeat(3,1fr);}}
@media(max-width:760px){.grid-2,.grid-3,.grid-4,.grid-5,.grid-6{grid-template-columns:repeat(2,1fr);}}

.card{background:linear-gradient(160deg,var(--navy3),var(--navy2));border:1px solid var(--border);border-radius:12px;padding:16px 18px;}
.card.flat{background:var(--navy2);}
.kpi .label{font-size:11.5px;color:var(--txt-dim);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;}
.kpi .value{font-size:23px;font-weight:700;color:#fff;}
.kpi .sub{font-size:12px;margin-top:5px;color:var(--txt-dim);}
.chg{font-weight:700;}
.chg.up{color:var(--green);}
.chg.down{color:var(--red);}
.chg.flat{color:var(--txt-dim);}

.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;background:rgba(255,255,255,.06);border:1px solid var(--border);}
.badge.up{color:var(--green);border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.08);}
.badge.down{color:var(--red);border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.08);}

.chart-card{background:var(--navy3);border:1px solid var(--border);border-radius:12px;padding:16px 18px;}
.chart-card .ctitle{font-size:13.5px;color:#fff;font-weight:600;margin-bottom:10px;}
.chart-wrap{position:relative;height:300px;}
.chart-wrap.small{height:240px;}
.chart-wrap.tall{height:380px;}

table{width:100%;border-collapse:collapse;font-size:12.5px;}
thead th{text-align:right;padding:8px 10px;color:var(--txt-dim);font-weight:600;border-bottom:1px solid var(--border);font-size:11.5px;text-transform:uppercase;letter-spacing:.02em;white-space:nowrap;position:sticky;top:0;background:var(--navy3);cursor:default;}
thead th.lbl{text-align:left;}
thead th.clickable{cursor:pointer;}
thead th.clickable:hover{color:#fff;background:#1c3a63;}
thead th.col-selected{color:var(--green);background:rgba(34,197,94,.12);}
tbody td{text-align:right;padding:7px 10px;border-bottom:1px solid rgba(255,255,255,.04);white-space:nowrap;}
tbody td.lbl{text-align:left;color:#fff;}
tbody tr:hover{background:rgba(255,255,255,.03);}
.table-scroll{overflow:auto;max-height:480px;border:1px solid var(--border);border-radius:10px;}
.table-card{background:var(--navy3);border:1px solid var(--border);border-radius:12px;padding:16px 18px;}
.table-card .ctitle{font-size:13px;font-weight:700;margin-bottom:10px;line-height:1.4;}
td.lbl{white-space:normal;word-break:break-word;max-width:340px;}
.pill.type-corp,.pill.type-fondo,.pill.type-ciaseg{flex-shrink:0;white-space:nowrap;}

.pill{padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;}
.pill.prod{color:#0B1F3A;}

.tabs-row{display:flex;gap:6px;margin-bottom:12px;}
.tabs-row button{background:var(--navy2);border:1px solid var(--border);color:var(--txt-dim);padding:7px 16px;border-radius:8px;font-size:12.5px;cursor:pointer;font-weight:600;}
.tabs-row button.active{background:var(--green);color:#06210f;border-color:var(--green);}

.foda-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.foda-box{border-radius:12px;padding:16px 18px;border:1px solid var(--border);}
.foda-box h4{margin:0 0 10px;font-size:14px;display:flex;align-items:center;gap:8px;}
.foda-box ul{margin:0;padding-left:18px;font-size:12.5px;line-height:1.65;color:var(--txt-dim);}
.foda-box ul li b{color:#fff;}
.foda-f{background:rgba(34,197,94,.07);border-color:rgba(34,197,94,.3);}
.foda-d{background:rgba(239,68,68,.07);border-color:rgba(239,68,68,.3);}
.foda-o{background:rgba(0,180,216,.07);border-color:rgba(0,180,216,.3);}
.foda-a{background:rgba(244,161,0,.07);border-color:rgba(244,161,0,.3);}

.selbar{display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:8px;min-height:24px;}
.selbar .total-badge{background:rgba(34,197,94,.12);border:1px solid var(--green);color:var(--green);padding:5px 12px;border-radius:8px;font-size:12.5px;font-weight:700;}
.selbar button.clear{background:none;border:1px solid var(--border);color:var(--txt-dim);padding:5px 10px;border-radius:8px;font-size:11.5px;cursor:pointer;}
.selbar button.clear:hover{color:#fff;border-color:#fff;}

.client-row{cursor:pointer;}
.client-row:hover td.lbl{color:var(--green);}
.disc-badge{display:inline-block;font-size:9.5px;font-weight:700;color:var(--red);border:1px solid rgba(239,68,68,.5);background:rgba(239,68,68,.1);padding:1px 6px;border-radius:5px;margin-left:6px;letter-spacing:.02em;vertical-align:middle;}
.pill.type-corp{background:rgba(96,165,250,.14);color:#60A5FA;border:1px solid rgba(96,165,250,.4);font-size:10px;padding:1px 7px;margin-right:6px;}
.pill.type-fondo{background:rgba(148,163,184,.14);color:#94A3B8;border:1px solid rgba(148,163,184,.35);font-size:10px;padding:1px 7px;margin-right:6px;}
.pill.type-ciaseg{background:rgba(244,161,0,.16);color:#F4A100;border:1px solid rgba(244,161,0,.45);font-size:10px;padding:1px 7px;margin-right:6px;}
.client-name-txt{cursor:pointer;}
.client-name-txt:hover{text-decoration:underline;color:var(--green);}
tr.client-row.sel-active{background:rgba(34,197,94,.10);}
tr.client-row.sel-active td.lbl{color:var(--green);}
.view-btn{background:none;border:none;color:var(--txt-dim);cursor:pointer;font-size:12px;margin-left:8px;}
.view-btn:hover{color:#fff;}
.sel-check{background:none;border:1px solid var(--border);color:var(--txt-dim);cursor:pointer;font-size:12px;border-radius:4px;width:20px;height:20px;line-height:1;margin-right:7px;padding:0;vertical-align:middle;}
.sel-check:hover{border-color:var(--green);color:var(--green);}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(2,8,20,.72);z-index:200;align-items:center;justify-content:center;}
.modal-bg.show{display:flex;}
.modal{background:var(--navy2);border:1px solid var(--border);border-radius:14px;width:90%;max-width:880px;max-height:86vh;overflow:auto;padding:22px 26px;}
.modal-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
.modal-head h3{margin:0;color:#fff;font-size:17px;}
.modal-head .close{cursor:pointer;color:var(--txt-dim);font-size:22px;line-height:1;background:none;border:none;}
.modal-head .close:hover{color:#fff;}

.kpi-row-note{font-size:11px;color:var(--txt-dim);margin-top:2px;}
.footer-note{text-align:center;color:#4A5F87;font-size:11px;margin-top:40px;}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <h1>📊 Facturación Aranceles MS<span id="sb-range"></span></h1>
    <div class="navitem active" data-tab="resumen"><span class="dot" style="background:#fff"></span>Resumen Ejecutivo</div>

    <div class="navgroup-label">Análisis</div>

    <div class="navitem" data-tab="foda"><span class="dot" style="background:#F87171"></span>Análisis &amp; FODA</div>
  </div>
  <div id="main">
    <div id="tab-resumen" class="tabpanel active"></div>
    <div id="tab-products-host"></div>
    <div id="tab-grupos" class="tabpanel"></div>
    <div id="tab-rankings" class="tabpanel"></div>
    <div id="tab-foda" class="tabpanel"></div>
    <div class="footer-note">Dashboard generado a partir de aranceles_ms.csv · Montos en USD · ⛔ = cliente en cese de operaciones (excluido de proyecciones)</div>
  </div>
</div>

<div class="modal-bg" id="clientModalBg">
  <div class="modal">
    <div class="modal-head">
      <h3 id="cmTitle">Cliente</h3>
      <button class="close" onclick="closeClientModal()">×</button>
    </div>
    <div id="cmBody"></div>
  </div>
</div>

<script>
/* =========================================================
   APP.JS - Dashboard Aranceles MS
   ========================================================= */
const MESES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const MONTHS = DATA.months;                 // ['2024-01', ... '2026-06']
const PRODUCTS_ALL = DATA.products;         // incl 'Otros'
const MAIN_PRODUCTS = PRODUCTS_ALL.filter(p=>p!=='Otros');
const PLABEL = DATA.productLabels;
const PCOLOR = DATA.productColors;
const CLIENTS = DATA.clients;               // [{id,name,grupo,discontinued}]
const CNAME = {}; CLIENTS.forEach(c=>CNAME[c.id]=c.name);
const CGRUPO = {}; CLIENTS.forEach(c=>CGRUPO[c.id]=c.grupo || 'Sin Asignar');

const YEARS = [...new Set(MONTHS.map(m=>m.slice(0,4)))];
const LAST_MONTH = MONTHS[MONTHS.length-1];
const PREV_MONTH = MONTHS[MONTHS.length-2];
const LAST_YEAR = LAST_MONTH.slice(0,4);
const PREV_YEAR = String(parseInt(LAST_YEAR)-1);
const LAST_MONTH_NUM = parseInt(LAST_MONTH.slice(5,7));
const SAME_MONTH_LAST_YEAR = PREV_YEAR+'-'+LAST_MONTH.slice(5,7);

function monthsOfYear(y){ return MONTHS.filter(m=>m.startsWith(y)); }
function ytdMonths(y, uptoNum){ return monthsOfYear(y).filter(m=>parseInt(m.slice(5,7))<=uptoNum); }

function monthLabel(p){ const [y,m]=p.split('-'); return MESES[parseInt(m)-1]+" '"+y.slice(2); }
function monthLabelLong(p){ const [y,m]=p.split('-'); return MESES[parseInt(m)-1]+' '+y; }

const NF = new Intl.NumberFormat('es-AR',{minimumFractionDigits:0,maximumFractionDigits:0});
const NF2 = new Intl.NumberFormat('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2});
function fmt(n){
  if(n===null||n===undefined||isNaN(n)) return '—';
  const a = Math.abs(n);
  if(a>0 && a<1000) return 'US$ '+NF2.format(n);
  return 'US$ '+NF.format(Math.round(n));
}
function fmtShort(n){
  if(n===null||n===undefined||isNaN(n)) return '—';
  const a = Math.abs(n); const sign = n<0?'-':'';
  if(a>=1e9) return sign+'$'+(a/1e9).toFixed(2)+'B';
  if(a>=1e6) return sign+'$'+(a/1e6).toFixed(1)+'M';
  if(a>=1e3) return sign+'$'+(a/1e3).toFixed(0)+'K';
  return sign+'$'+a.toFixed(0);
}

/* ---------- Discontinued clients (dejan de operar) ---------- */
const DISCONTINUED_IDS = new Set(DATA.discontinuedIds || []);
function isDiscontinued(cid){ return DISCONTINUED_IDS.has(cid); }
function discBadge(){ return '<span class="disc-badge" title="Cliente informado como cese de operaciones">⛔ DEJA DE OPERAR</span>'; }
function nameWithBadge(cid, name){ return isDiscontinued(cid) ? `${name} ${discBadge()}` : name; }

/* ---------- Clasificación de clientes: Fondo / Corporativo / Cía de Seguros ---------- */
const CORP_NAMES = new Set([
  'RIGI VMOS SA','LDC ARGENTINA',
  'SACDE SOCIEDAD ARGENTINA DE CONSTRUCCION Y DESARROLLO ESTRATEGICO SA',
  'FIRST DATA CONO SUR SRL','PAYWAY SAU','BUNGE ARGENTINA SA',
  'SOEME','TELECOM ARGENTINA SA','MAXIMIA SA','SEVEN GESTION SAS','ALPAC SRL',
  'CERRO BAYO SA','LUIS ARCEO SRL','MIRGOR SA C I F I A','NEW SAN'
]);
const CIASEG_NAMES = new Set([
  'CIA SEG MERCANTIL ANDINA SA','ANDINA ART SA','GALENO ART SA','GALENO SEGUROS SA',
  'ORIGENES SEGUROS DE RETIRO SA','LIFE GROUP S.A','LIFE SEGUROS DE PERS Y PATR SA',
  'LA HOLANDO SUDAMERICANA COMPAÑIA DE SEGUROS SA','PROVINCIA ASEGURADORA DE RIESGOS DEL TRABAJO SA',
  'EXPERTA ASEGURADORA DE RIESGOS DEL TRABAJO SA'
]);
function clientType(cid){
  const n = (CNAME[cid]||'').toUpperCase().trim();
  if(CIASEG_NAMES.has(n)) return 'ciaseg';
  if(CORP_NAMES.has(n)) return 'corp';
  return 'fondo';
}
function isCorporate(cid){ return clientType(cid)==='corp'; }
function isCiaSeguros(cid){ return clientType(cid)==='ciaseg'; }
function groupType(ids){
  if(ids.length && ids.every(id=>clientType(id)==='ciaseg')) return 'ciaseg';
  if(ids.length && ids.every(id=>clientType(id)==='corp')) return 'corp';
  return 'fondo';
}
function groupIsCorporate(ids){ return groupType(ids)==='corp'; }
const TYPE_LABEL = {fondo:'Fondo', corp:'Corpo', ciaseg:'Cía Seg.'};
const TYPE_LABEL_LONG = {fondo:'Fondo Común de Inversión', corp:'Cliente Corporativo', ciaseg:'Compañía de Seguros'};
function typePill(cid){
  const t = clientType(cid);
  return `<span class="pill type-${t}" title="${TYPE_LABEL_LONG[t]}">${TYPE_LABEL[t]}</span>`;
}
function groupTypePill(ids){
  const t = groupType(ids);
  return `<span class="pill type-${t}" title="${TYPE_LABEL_LONG[t]}">${TYPE_LABEL[t]}</span>`;
}

/* ---------- Reactivación de operatoria ---------- */
function hadPriorActivity(cid, prod, beforePeriod){
  for(const m of MONTHS){ if(m>=beforePeriod) break; if(cpm(cid,prod,m)>0) return true; }
  return false;
}
/* Cliente "habitual": operó en al menos minActive de los últimos `months` meses para ese producto
   (o en total, si prod es null). Se usa para no contemplar operatorias chicas y puntuales en subió/bajó. */
function isHabitual(cid, prod, months, minActive){
  months = months || 6; minActive = minActive || 4;
  const recent = MONTHS.slice(-months);
  let count = 0;
  recent.forEach(m=>{
    const v = prod ? cpm(cid,prod,m) : (clientMonthAll[cid] ? (clientMonthAll[cid][m]||0) : 0);
    if(v>0) count++;
  });
  return count >= minActive;
}
function statusTag(cid, prod, prevPeriod, prevVal){
  if(prevVal>0) return '';
  return hadPriorActivity(cid,prod,prevPeriod)
    ? '<span class="badge up" style="margin-left:6px;">🔄 Volvió a operar</span>'
    : '<span class="badge flat" style="margin-left:6px;">🆕 Nuevo</span>';
}

/* ---------- Celda de cliente: checkbox (suma a selección) + nombre clickeable (abre detalle mensual con gráfico) ---------- */
function clientCellHtml(cid, name){
  return `<button class="sel-check" data-cid="${cid}" title="Sumar a selección acumulada">☐</button>${typePill(cid)}<span class="client-name-txt" data-cid="${cid}" title="Ver evolución mensual">${nameWithBadge(cid,name)}</span>`;
}

/* ---------- Selección acumulable por cliente (suma fondos de una misma sociedad gestora) ---------- */
const clientSelSets = {};
function getSelSet(key){ if(!clientSelSets[key]) clientSelSets[key] = new Set(); return clientSelSets[key]; }
function wireSelectableRows(tableEl, key, valueMap, badgeEl){
  const sel = getSelSet(key);
  function refreshRowStyles(){
    tableEl.querySelectorAll('tr.client-row').forEach(tr=>{
      const on = sel.has(tr.dataset.cid);
      tr.classList.toggle('sel-active', on);
      const chk = tr.querySelector('.sel-check');
      if(chk) chk.textContent = on ? '☑' : '☐';
    });
  }
  function refreshBadge(){
    if(!badgeEl) return;
    if(sel.size===0){ badgeEl.innerHTML=''; return; }
    let total=0; sel.forEach(id=>total+=(valueMap[id]||0));

function pctChange(curr, prev){
  if(prev===0||prev===undefined||prev===null){ if(!curr) return 0; return null; }
  return (curr-prev)/Math.abs(prev)*100;
}
function pctStr(n){
  if(n===null) return 'Nuevo';
  const s = n>0?'+':''; return s+n.toFixed(1)+'%';
}
function chgClass(n){ if(n===null) return 'up'; if(n>0.05) return 'up'; if(n<-0.05) return 'down'; return 'flat'; }
function badgeHtml(n, extra){
  const cls = chgClass(n);
  const arrow = cls==='up'?'▲':cls==='down'?'▼':'■';
  return `<span class="badge ${cls}">${arrow} ${pctStr(n)}${extra?(' '+extra):''}</span>`;
}
function chgSpan(n){
  const cls=chgClass(n); const arrow= cls==='up'?'↑':cls==='down'?'↓':'→';
  return `<span class="chg ${cls}">${arrow} ${pctStr(n)}</span>`;
}

/* ---------- Pre-aggregation ---------- */
// monthlyByProduct[prod][period] = sum ; monthlyByProduct['ALL'][period] = total
const monthlyByProduct = {}; PRODUCTS_ALL.concat(['ALL']).forEach(p=>monthlyByProduct[p]={});
MONTHS.forEach(m=>{ PRODUCTS_ALL.concat(['ALL']).forEach(p=>monthlyByProduct[p][m]=0); });

// clientYearByProduct[cid][prod][year]
const clientYearByProduct = {};
// clientMonthAll[cid][period] = sum across all products
const clientMonthAll = {};
// clientProdMonth direct accessor uses DATA.vals
function cpm(cid, prod, period){ const v=DATA.vals[cid]; if(!v) return 0; const vp=v[prod]; if(!vp) return 0; return vp[period]||0; }

CLIENTS.forEach(c=>{
  const cid=c.id;
  clientMonthAll[cid]={};
  clientYearByProduct[cid]={};
  const cv = DATA.vals[cid]||{};
  PRODUCTS_ALL.forEach(prod=>{
    clientYearByProduct[cid][prod]={};
    YEARS.forEach(y=>clientYearByProduct[cid][prod][y]=0);
    const pv = cv[prod];
    if(pv){
      for(const period in pv){
        const val = pv[period];
        monthlyByProduct[prod][period] = (monthlyByProduct[prod][period]||0) + val;
        monthlyByProduct['ALL'][period] = (monthlyByProduct['ALL'][period]||0) + val;
        clientMonthAll[cid][period] = (clientMonthAll[cid][period]||0) + val;
        const y = period.slice(0,4);
        clientYearByProduct[cid][prod][y] = (clientYearByProduct[cid][prod][y]||0) + val;
      }
    }
  });
});

function sumProductPeriod(prod, period){ return monthlyByProduct[prod][period]||0; }
function yearTotal(prod, year){ return monthsOfYear(year).reduce((s,m)=>s+sumProductPeriod(prod,m),0); }
function ytdTotal(prod, year, uptoNum){ return ytdMonths(year,uptoNum).reduce((s,m)=>s+sumProductPeriod(prod,m),0); }
function clientYearTotal(cid, prod, year){ return clientYearByProduct[cid][prod][year]||0; }
function clientYTD(cid, prod, year, uptoNum){ return ytdMonths(year,uptoNum).reduce((s,m)=>s+cpm(cid,prod,m),0); }
function clientTotalAllTime(cid, prod){
  if(prod) return YEARS.reduce((s,y)=>s+clientYearTotal(cid,prod,y),0);
  return MAIN_PRODUCTS.concat(['Otros']).reduce((s,p)=>s+clientTotalAllTime(cid,p),0);
}
function clientLastMonth(cid,prod){ return prod? cpm(cid,prod,LAST_MONTH) : (clientMonthAll[cid][LAST_MONTH]||0); }
function clientPrevMonth(cid,prod){ return prod? cpm(cid,prod,PREV_MONTH) : (clientMonthAll[cid][PREV_MONTH]||0); }

function clientsWithActivity(prod){
  return CLIENTS.filter(c=> clientTotalAllTime(c.id, prod) > 0);
}

      const med = sorted.length? (sorted.length%2? sorted[(sorted.length-1)/2] : (sorted[sorted.length/2-1]+sorted[sorted.length/2])/2) : 0;

    });
    h+='</tbody></table></div>'; return h;
  }
  document.getElementById('resumen-up-table').innerHTML = moveTable(up);
  document.getElementById('resumen-down-table').innerHTML = moveTable(down);
  wireGroupLinks(document.getElementById('resumen-up-table'));
  wireGroupLinks(document.getElementById('resumen-down-table'));
}

function renderDetailTable(prod){
  const container = document.getElementById('tb-'+prod+'-detail');
  const sel = colSelections[prod];
  const groupsDet = buildGroups();
  const active = Object.entries(groupsDet).map(([g,ids])=>{
    const idsActive = ids.filter(id=>clientTotalAllTime(id,prod)>0);
    if(!idsActive.length) return null;
    const cur = groupMonthTotal(ids,prod,LAST_MONTH), prev = groupMonthTotal(ids,prod,PREV_MONTH);
    const yearTotals = {}; YEARS.forEach(y=>yearTotals[y]=groupYearTotal(ids,prod,y));
    const ytdC = ids.reduce((s,id)=>s+clientYTD(id,prod,LAST_YEAR,LAST_MONTH_NUM),0);
    const ytdP = ids.reduce((s,id)=>s+clientYTD(id,prod,PREV_YEAR,LAST_MONTH_NUM),0);
    const tot = ids.reduce((s,id)=>s+clientTotalAllTime(id,prod),0);
    return {name:g, ids, nFunds: idsActive.length, cur, prev, yearTotals, chgMonth: pctChange(cur,prev), yoy: pctChange(ytdC,ytdP), tot};
  }).filter(Boolean).sort((a,b)=>b.tot-a.tot);

  let h = `<table><thead><tr><th class="lbl">Sociedad Gerente</th><th># Clientes</th>`;
  YEARS.forEach(y=>h+=`<th class="clickable ${sel.has(y)?'col-selected':''}" data-y="${y}">${y} ⤓</th>`);
  h += `<th>Tendencia</th><th>Var. vs mes ant.</th><th>YoY YTD</th><th>Fact. Total</th></tr></thead><tbody>`;
  active.forEach(r=>{
    const trend = r.cur>r.prev? '↑' : r.cur<r.prev? '↓' : '→';
    const trendCls = r.cur>r.prev?'up':r.cur<r.prev?'down':'flat';
    h += `<tr><td class="lbl">${groupCellHtml(r.name, r.ids, prod)}</td><td>${r.nFunds}</td>`;
    YEARS.forEach(y=>h+=`<td>${fmt(r.yearTotals[y])}</td>`);
    h += `<td><span class="chg ${trendCls}">${trend}</span></td><td>${chgSpan(r.chgMonth)}</td><td>${chgSpan(r.yoy)}</td><td style="font-weight:700;">${fmt(r.tot)}</td></tr>`;
  });
  h += '</tbody></table>';
  container.innerHTML = h;

  container.querySelectorAll('th.clickable').forEach(th=>{
    th.addEventListener('click', ()=>{
      const y = th.dataset.y;
      if(sel.has(y)) sel.delete(y); else sel.add(y);
      renderDetailTable(prod);
    });
  });

  // selection total badge (columnas año)
  const selbarTotal = document.getElementById('selbar-total-'+prod);
  if(sel.size>0){
    const total = active.reduce((s,r)=>s+YEARS.filter(y=>sel.has(y)).reduce((s2,y)=>s2+r.yearTotals[y],0),0);
    selbarTotal.innerHTML = `<span class="total-badge">Σ ${[...sel].join(', ')}: ${fmt(total)}</span> <button class="clear" id="clear-${prod}">Limpiar</button>`;
    document.getElementById('clear-'+prod).addEventListener('click', ()=>{ sel.clear(); renderDetailTable(prod); });
  } else {
    selbarTotal.innerHTML = '';
  }

  wireGroupLinks(container);
}

function buildGroups(){
  const groups = {};
  CLIENTS.forEach(c=>{
    const g = CGRUPO[c.id] || 'Sin Asignar';
    if(!groups[g]) groups[g] = [];
    groups[g].push(c.id);
  });
  return groups;
}
function groupStats(groupName, ids, prod){
  const prodsList = prod ? [prod] : MAIN_PRODUCTS.concat(['Otros']);
  const totByProd = {}; prodsList.forEach(p=>totByProd[p]=ids.reduce((s,id)=>s+clientTotalAllTime(id,p),0));
  const total = Object.values(totByProd).reduce((a,b)=>a+b,0);
  const ytdCur = ids.reduce((s,id)=>s+prodsList.reduce((s2,p)=>s2+clientYTD(id,p,LAST_YEAR,LAST_MONTH_NUM),0),0);
  const ytdPrev = ids.reduce((s,id)=>s+prodsList.reduce((s2,p)=>s2+clientYTD(id,p,PREV_YEAR,LAST_MONTH_NUM),0),0);
  const cur = ids.reduce((s,id)=> s + (prod? cpm(id,prod,LAST_MONTH) : clientLastMonth(id)), 0);
  const prev = ids.reduce((s,id)=> s + (prod? cpm(id,prod,PREV_MONTH) : clientPrevMonth(id)), 0);
  const allDiscontinued = ids.every(id=>isDiscontinued(id));
  const someDiscontinued = ids.some(id=>isDiscontinued(id));
  return {name:groupName, ids, totByProd, total, ytdCur, ytdPrev, yoy:pctChange(ytdCur,ytdPrev), cur, prev, mom:pctChange(cur,prev), allDiscontinued, someDiscontinued};
}
function groupYearTotal(ids, prod, year){
  const prodsList = prod ? [prod] : MAIN_PRODUCTS.concat(['Otros']);
  return ids.reduce((s,id)=>s+prodsList.reduce((s2,p)=>s2+clientYearTotal(id,p,year),0),0);
}
function groupMonthTotal(ids, prod, period){
  return prod ? ids.reduce((s,id)=>s+cpm(id,prod,period),0) : ids.reduce((s,id)=>s+(clientMonthAll[id]?(clientMonthAll[id][period]||0):0),0);
}
function isHabitualGroup(ids, prod, months, minActive){
  months = months||6; minActive = minActive||4;
  const recent = MONTHS.slice(-months);
  let count=0;
  recent.forEach(m=>{ if(groupMonthTotal(ids,prod,m)>0) count++; });
  return count>=minActive;
}
function hadPriorActivityAllIds(ids, beforePeriod){
  return ids.some(id=>{
    for(const m of MONTHS){ if(m>=beforePeriod) break; if((clientMonthAll[id]&&clientMonthAll[id][m])>0) return true; }
    return false;
  });
}
function groupReturned(ids, prod, prevPeriod){
  // true si el grupo estaba en $0 el período anterior pero algún fondo del grupo ya había operado antes
  return hadPriorActivityAllIds(ids, prevPeriod) || ids.some(id=> prod? hadPriorActivity(id,prod,prevPeriod) : false);
}

  document.getElementById('cmTitle').innerHTML = groupName + prodTag + (s.allDiscontinued? ' '+discBadge() : '');

  // Si viene filtrado por producto: tabla últimos 6 meses por fondo
  // Si viene sin filtro (desde Sociedades Gerentes): tabla histórica fondo × producto
  const hasFilter = !!prod;
  const allIds = ids.filter(id=>clientTotalAllTime(id)>0).sort((a,b)=>clientTotalAllTime(b)-clientTotalAllTime(a));

  let h = `<div class="chart-wrap" style="height:220px;margin-bottom:14px;"><canvas id="cm-chart"></canvas></div>`;
  h += `<p style="color:var(--txt-dim);font-size:12px;margin:0 0 10px;">

    Fact. total acumulada: <b style="color:#fff;">${fmt(s.total)}</b>
  </p>`;

  if(!hasFilter){
    // TABLA HISTÓRICA: fondo × producto (qué opera u operó alguna vez)
    const PROD_SHOW = MAIN_PRODUCTS;
    h += `<div style="margin-bottom:6px;font-size:11.5px;color:var(--txt-dim);">
      <span style="color:#22C55E;font-size:13px;">●</span> Opera actualmente (últ. 6m) &nbsp;
      <span style="color:#FBBF24;font-size:13px;">◑</span> Operó históricamente &nbsp;
      <span style="color:#334155;font-size:13px;">–</span> Sin operatoria
    </div>`;
    h += `<div class="table-scroll" style="max-height:400px;"><table><thead><tr>
      <th class="lbl">Fondo / Cliente</th>
      ${PROD_SHOW.map(p=>`<th style="text-align:center;white-space:nowrap;"><span class="pill prod" style="background:${PCOLOR[p]};font-size:9px;">${PLABEL[p]}</span></th>`).join('')}
      <th>Fact. Total</th><th>% del grupo</th></tr></thead><tbody>`;
    const last6m = MONTHS.slice(-6);
    allIds.forEach(id=>{
      const tot = clientTotalAllTime(id);
      h += `<tr><td class="lbl" style="white-space:normal;max-width:260px;">${nameWithBadge(id,CNAME[id])}</td>`;
      PROD_SHOW.forEach(p=>{
        const totProd = clientTotalAllTime(id,p);
        const activeProd = last6m.some(m=>cpm(id,p,m)>0);
        let cell = '<span style="color:#334155;font-size:14px;">–</span>';
        if(totProd>0){
          if(activeProd) cell = `<span style="color:#22C55E;font-size:14px;" title="${PLABEL[p]}: ${fmt(totProd)} acumulado">●</span>`;
          else cell = `<span style="color:#FBBF24;font-size:14px;" title="${PLABEL[p]}: ${fmt(totProd)} acumulado (no operó últ. 6m)">◑</span>`;
        }
        h += `<td style="text-align:center;">${cell}</td>`;
      });
      h += `<td style="font-weight:700;">${fmt(tot)}</td><td>${s.total>0?(tot/s.total*100).toFixed(1)+'%':'—'}</td></tr>`;
    });
    // Fila de totales por producto
    h += `<tfoot><tr style="font-weight:700;border-top:2px solid var(--border);">
      <td class="lbl">TOTAL por producto</td>`;
    PROD_SHOW.forEach(p=>{
      const totP = allIds.reduce((sum,id)=>sum+clientTotalAllTime(id,p),0);
      h += `<td style="text-align:center;font-size:11px;color:${totP>0?'#fff':'#334155'};">${totP>0?fmt(totP):'—'}</td>`;
    });
    h += `<td style="font-weight:700;">${fmt(s.total)}</td><td>100%</td></tr></tfoot>`;
    h += `</tbody></table></div>`;
  } else {
    // TABLA FILTRADA POR PRODUCTO: últimos 6 meses por fondo
    const fundRows = allIds.filter(id=>clientTotalAllTime(id,prod)>0);
    const last6 = MONTHS.slice(-6);
    h += `<div class="table-scroll" style="max-height:360px;"><table><thead><tr>
      <th class="lbl">Fondo / Cliente</th>`;
    last6.forEach(m=>h+=`<th>${monthLabel(m)}</th>`);
    h += `<th>Fact. Total</th><th>%</th></tr></thead><tbody>`;
    fundRows.forEach(id=>{
      const tot = clientTotalAllTime(id,prod);
      h += `<tr><td class="lbl">${nameWithBadge(id,CNAME[id])}</td>`;
      last6.forEach(m=>{ const v=cpm(id,prod,m); h+=`<td>${v?fmt(v):'—'}</td>`; });
      h += `<td style="font-weight:700;">${fmt(tot)}</td><td>${s.total>0?(tot/s.total*100).toFixed(1)+'%':'—'}</td></tr>`;
    });
    h += `</tbody></table></div>`;
  }

  document.getElementById('cmBody').innerHTML = h;
  document.getElementById('clientModalBg').classList.add('show');

  // Gráfico: evolución del grupo total (sin filtro) o del producto (con filtro)
  const chartDatasets = prod
    ? [{label:PLABEL[prod], data:MONTHS.map(m=>ids.reduce((sum,id)=>sum+cpm(id,prod,m),0)), borderColor:PCOLOR[prod], backgroundColor:PCOLOR[prod]+'22', tension:.3, pointRadius:2, fill:true}]
    : MAIN_PRODUCTS.filter(p=>ids.some(id=>clientTotalAllTime(id,p)>0)).map(p=>({label:PLABEL[p], data:MONTHS.map(m=>ids.reduce((sum,id)=>sum+cpm(id,p,m),0)), borderColor:PCOLOR[p], backgroundColor:'transparent', tension:.3, pointRadius:2}));
  makeChart('cm-chart', {
    type:'line', data:{labels:MONTHS.map(monthLabel), datasets:chartDatasets},
    options:{responsive:true,maintainAspectRatio:false, scales:{y:moneyTick()}, plugins:{legend:{position:'bottom', labels:{boxWidth:10}}}}
  });
}
function cpm_all(cid, period){ return MAIN_PRODUCTS.concat(['Otros']).reduce((s,p)=>s+cpm(cid,p,period),0); }

/* ---------- Celda de Sociedad Gerente: nombre clickeable abre detalle fondo x fondo ---------- */
function groupCellHtml(groupName, ids, prod, extraTag){
  const pill = ids ? groupTypePill(ids) : '';
  return `${pill}<span class="client-name-txt group-link" data-grupo="${encodeURIComponent(groupName)}" data-prod="${prod||''}" title="Ver detalle fondo por fondo">${groupName}</span>${extraTag||''}`;
}
function wireGroupLinks(container){
  container.querySelectorAll('.group-link').forEach(span=>{
    span.addEventListener('click', (e)=>{
      e.stopPropagation();
      const g = decodeURIComponent(span.dataset.grupo);
      const p = span.dataset.prod || null;
      openGroupModal(g, p);
    });
  });
}

  wireGroupLinks(document.getElementById('rk-va-table'));

function openClientModal(cid){

  h+=`<th>Fact. Total</th></tr></thead><tbody>`;

    h+=`<tr><td class="lbl">${monthLabel(m)}</td>`;

  // Facturación por Tipo de Cliente (Fondo / Corporativo / Cía de Seguros)
  const TYPE_KEYS = ['fondo','corp','ciaseg'];
  const TYPE_COLOR = {fondo:'#22C55E', corp:'#60A5FA', ciaseg:'#F4A100'};
  const tipoStats = TYPE_KEYS.map(t=>{
    const rows = allTotals.filter(r=>groupType(r.ids)===t);
    const tot = rows.reduce((s,r)=>s+r.tot,0);
    const ytdC = rows.reduce((s,r)=>s+r.ids.reduce((s2,id)=>s2+clientYTDall(id,LAST_YEAR),0),0);
    const ytdP = rows.reduce((s,r)=>s+r.ids.reduce((s2,id)=>s2+clientYTDall(id,PREV_YEAR),0),0);
    return {t, label: t==='fondo'?'Fondos (FCI)':t==='corp'?'Corporativos':'Cías de Seguros', n: rows.length, tot, ytdC, ytdP, yoy: pctChange(ytdC,ytdP)};
  }).filter(r=>r.tot>0);
  makeChart('ch-foda-tipo', {
    type:'doughnut',
    data:{labels:tipoStats.map(r=>r.label), datasets:[{data:tipoStats.map(r=>r.tot), backgroundColor:tipoStats.map(r=>TYPE_COLOR[r.t]), borderColor:'#0B1F3A', borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false, plugins:{legend:{position:'bottom'}}}
  });
  let ht = `<table><thead><tr><th class="lbl">Tipo</th><th># Entidades</th><th>Facturación Acumulada</th><th>% del total</th><th>YTD ${PREV_YEAR}</th><th>YTD ${LAST_YEAR}</th><th>YoY</th></tr></thead><tbody>`;
  tipoStats.forEach(r=>{
    ht += `<tr><td class="lbl"><span class="pill type-${r.t}">${TYPE_LABEL[r.t]}</span> ${r.label}</td><td>${r.n}</td><td>${fmt(r.tot)}</td><td>${(r.tot/grandTotal*100).toFixed(1)}%</td><td>${fmt(r.ytdP)}</td><td>${fmt(r.ytdC)}</td><td>${chgSpan(r.yoy)}</td></tr>`;
  });
  ht += '</tbody></table>';
  document.getElementById('foda-tipo-table').innerHTML = ht;

  // Sociedades Gerentes nuevas
  let hn = `<table><thead><tr><th class="lbl">Sociedad Gerente</th><th># Clientes</th><th>1ra actividad</th><th>Facturación ${LAST_YEAR}</th><th>Tendencia</th></tr></thead><tbody>`;
  newAccounts.map(r=>{
    const f = groupFirstActiveMonth(r.ids);
    const tot = r.ids.reduce((s,id)=>s+MAIN_PRODUCTS.concat(['Otros']).reduce((s2,p)=>s2+clientYearTotal(id,p,LAST_YEAR),0),0);
    const cur=r.ids.reduce((s,id)=>s+clientLastMonth(id),0), prev=r.ids.reduce((s,id)=>s+clientPrevMonth(id),0);
    const trend = cur>prev?'↑':cur<prev?'↓':'→'; const cls = cur>prev?'up':cur<prev?'down':'flat';
    return {name:r.name, ids:r.ids, f, tot, trend, cls};
  }).sort((a,b)=>b.tot-a.tot).forEach(r=>{
    hn+=`<tr><td class="lbl">${groupCellHtml(r.name, r.ids)}</td><td>${r.ids.length}</td><td>${monthLabel(r.f)}</td><td>${fmt(r.tot)}</td><td><span class="chg ${r.cls}">${r.trend}</span></td></tr>`;
  });
  hn+='</tbody></table>';
  document.getElementById('foda-new-table').innerHTML = hn;
  wireGroupLinks(document.getElementById('foda-new-table'));
  document.getElementById('sec-cuentasnuevas').style.display = newAccounts.length? '' : 'none';

  // Rampeo: crecimiento sostenido últimos 6 meses — agrupado por Sociedad Gerente
  const last6 = MONTHS.slice(-6);
  const ramping = Object.entries(groupsF).map(([g,ids])=>{
    const vals = last6.map(m=>groupMonthTotal(ids,null,m));
    if(vals.every(v=>v===0)) return null;
    let increases=0; for(let i=1;i<vals.length;i++){ if(vals[i]>vals[i-1]) increases++; }
    const totalChg = pctChange(vals[vals.length-1], vals[0]);
    return {name:g, ids, vals, increases, totalChg};
  }).filter(r=>r && !r.ids.every(id=>isDiscontinued(id)) && r.increases>=4 && r.vals[r.vals.length-1]>0).sort((a,b)=>(b.totalChg||0)-(a.totalChg||0)).slice(0,15);
  let hr = `<table><thead><tr><th class="lbl">Sociedad Gerente</th>`;
  last6.forEach(m=>hr+=`<th>${monthLabel(m)}</th>`);
  hr+=`<th>Var. total</th></tr></thead><tbody>`;
  ramping.forEach(r=>{
    hr+=`<tr><td class="lbl">${groupCellHtml(r.name, r.ids)}</td>`;
    r.vals.forEach(v=>hr+=`<td>${v?fmt(v):'—'}</td>`);
    hr+=`<td>${chgSpan(r.totalChg)}</td></tr>`;
  });
  hr+='</tbody></table>';
  document.getElementById('foda-ramp-table').innerHTML = hr;
  wireGroupLinks(document.getElementById('foda-ramp-table'));
  document.getElementById('sec-rampeo').style.display = ramping.length? '' : 'none';

  // Sociedades Gerentes más diversificadas por cantidad de productos (sumando todos sus fondos)
  const diverse = Object.entries(groupsF).map(([g,ids])=>{
    const prodsUsed = MAIN_PRODUCTS.concat(['Otros']).filter(p=>ids.some(id=>clientTotalAllTime(id,p)>0));
    return {name:g, ids, n: prodsUsed.length, prods: prodsUsed, tot: ids.reduce((s,id)=>s+clientTotalAllTime(id),0)};
  }).filter(r=>r.n>0).sort((a,b)=> b.n-a.n || b.tot-a.tot).slice(0,15);
  let hd = `<table><thead><tr><th class="lbl">Sociedad Gerente</th><th># Clientes</th><th>Cant. productos</th><th class="lbl">Productos</th><th>Total acumulado</th></tr></thead><tbody>`;
  diverse.forEach(r=>{
    hd+=`<tr><td class="lbl">${groupCellHtml(r.name, r.ids)}</td><td>${r.ids.length}</td><td>${r.n}</td><td class="lbl">${r.prods.map(p=>`<span class="pill prod" style="background:${PCOLOR[p]};margin-right:3px;">${PLABEL[p]}</span>`).join('')}</td><td>${fmt(r.tot)}</td></tr>`;
  });
  hd+='</tbody></table>';
  document.getElementById('foda-diverse-table').innerHTML = hd;
  wireGroupLinks(document.getElementById('foda-diverse-table'));
  document.getElementById('sec-diversificados').style.display = diverse.length? '' : 'none';

  // ── Análisis de Sociedades Gerentes: composición y actividad ──────────────
  const last6m = MONTHS.slice(-6);
  const matrizRows = allTotals.map(r=>{
    const nClients = r.ids.length;
    // activos en los últimos 6 meses (al menos 1 mes con facturación)
    const activeIds  = r.ids.filter(id=>last6m.some(m=>cpm_all(id,m)>0));
    const inactiveIds = r.ids.filter(id=>last6m.every(m=>cpm_all(id,m)===0) && clientTotalAllTime(id)>0);
    // actividad por producto (últimos 6 meses del grupo)
    const prodActivity = {};
    MAIN_PRODUCTS.forEach(p=>{
      const hasActivity = r.ids.some(id=>last6m.some(m=>cpm(id,p,m)>0));
      const wasActive   = r.ids.some(id=>MONTHS.slice(-12,-6).some(m=>cpm(id,p,m)>0));
      prodActivity[p] = hasActivity ? 'activo' : wasActive ? 'inactivo' : 'nunca';
    });
    return {name:r.name, ids:r.ids, nClients, activeIds, inactiveIds, prodActivity, tot:r.tot};
  });

  // Gráfico composición: # clientes por sociedad (top 15)
  const compTop = matrizRows.slice(0,15);
  makeChart('ch-foda-compsize', {
    type:'bar',
    data:{labels:compTop.map(r=>r.name.length>22?r.name.slice(0,22)+'…':r.name),
          datasets:[
            {label:'Activos (últ. 6 m)', data:compTop.map(r=>r.activeIds.length), backgroundColor:'#22C55ECC', borderRadius:2},
            {label:'Inactivos', data:compTop.map(r=>r.inactiveIds.length), backgroundColor:'#EF444488', borderRadius:2}
          ]},
    options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',scales:{x:{stacked:true,...moneyTick(),ticks:{callback:v=>v}},y:{stacked:true}},plugins:{legend:{position:'bottom'}}}
  });

  // Gráfico operan vs dejaron de operar (a nivel sociedad)
  const activeGroups  = matrizRows.filter(r=>r.activeIds.length>0 && !r.ids.every(id=>isDiscontinued(id)));
  const inactiveGroups = matrizRows.filter(r=>r.activeIds.length===0 || r.ids.every(id=>isDiscontinued(id)));
  makeChart('ch-foda-activity', {
    type:'doughnut',
    data:{labels:['Operan (últ. 6 m)','Dejaron de operar'],
          datasets:[{data:[activeGroups.length, inactiveGroups.length], backgroundColor:['#22C55ECC','#EF4444AA'], borderColor:'#0B1F3A', borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'},tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${ctx.raw} soc.`}}}}
  });

  // Matriz de operatoria: soc. gerente × producto — últimos 6 meses
  const CELL = {
    activo:  `<span style="color:#22C55E;font-size:15px;" title="Operó los últimos 6 meses">●</span>`,
    inactivo:`<span style="color:#EF4444;font-size:15px;" title="Operó antes pero no en los últimos 6 meses">○</span>`,
    nunca:   `<span style="color:#334155;font-size:15px;" title="Sin operatoria histórica">–</span>`
  };
  let hm = `<table><thead><tr><th class="lbl">Sociedad Gerente</th><th># Cl.</th>`;
  MAIN_PRODUCTS.forEach(p=>hm+=`<th style="text-align:center;"><span class="pill prod" style="background:${PCOLOR[p]}">${PLABEL[p]}</span></th>`);
  hm+=`<th>Activos</th><th>Inactivos</th><th>Estado</th></tr></thead><tbody>`;
  matrizRows.sort((a,b)=>b.activeIds.length-a.activeIds.length || b.tot-a.tot).forEach(r=>{
    const cesante = r.ids.every(id=>isDiscontinued(id));
    const rowStyle = cesante ? 'opacity:.55;' : '';
    hm+=`<tr style="${rowStyle}"><td class="lbl">${groupTypePill(r.ids)}<span class="client-name-txt group-link" data-grupo="${encodeURIComponent(r.name)}" data-prod="" title="Ver detalle">${r.name}</span></td><td>${r.nClients}</td>`;
    MAIN_PRODUCTS.forEach(p=>hm+=`<td style="text-align:center;">${CELL[r.prodActivity[p]]}</td>`);
    hm+=`<td style="color:var(--green);font-weight:700;">${r.activeIds.length}</td><td style="color:var(--red);">${r.inactiveIds.length}</td>`;
    hm+=`<td class="lbl">${cesante? discBadge() : r.activeIds.length>0? '<span class="badge up" style="font-size:10px;">Activa</span>' : '<span class="badge down" style="font-size:10px;">Inactiva</span>'}</td></tr>`;
  });
  hm+=`<tfoot><tr style="font-weight:700;border-top:2px solid var(--border);"><td class="lbl">TOTAL</td><td>${matrizRows.reduce((s,r)=>s+r.nClients,0)}</td>`;
  MAIN_PRODUCTS.forEach(p=>hm+=`<td style="text-align:center;font-size:11px;color:var(--txt-dim);">${matrizRows.filter(r=>r.prodActivity[p]==='activo').length}/<span style="color:var(--red)">${matrizRows.filter(r=>r.prodActivity[p]==='inactivo').length}</span></td>`);
  hm+=`<td style="color:var(--green);">${activeGroups.length}</td><td style="color:var(--red);">${inactiveGroups.length}</td><td></td></tr></tfoot></table>`;
  document.getElementById('foda-matriz-table').innerHTML = hm;
  wireGroupLinks(document.getElementById('foda-matriz-table'));

  // Crecimiento por producto YTD con señal
  let hp = `<table><thead><tr><th class="lbl">Producto</th><th>YTD ${PREV_YEAR}</th><th>YTD ${LAST_YEAR}</th><th>Variación</th><th class="lbl">Señal</th></tr></thead><tbody>`;
  const prodGrowthRows = MAIN_PRODUCTS.concat(['Otros']).map(p=>{
    const c = ytdTotal(p,LAST_YEAR,LAST_MONTH_NUM), pr = ytdTotal(p,PREV_YEAR,LAST_MONTH_NUM);
    const chg = pctChange(c,pr);
    return {p, c, pr, chg};
  }).filter(r=>r.c>0||r.pr>0).sort((a,b)=>(b.chg??-999)-(a.chg??-999));
  prodGrowthRows.forEach(r=>{
    let signal = '➡️ Estable';
    if(r.chg===null) signal='🆕 Nuevo';
    else if(r.chg>=40) signal='🚀 Explosivo';
    else if(r.chg>=10) signal='📈 Crecimiento';
    else if(r.chg<=-15) signal='📉 Caída';
    hp+=`<tr><td class="lbl"><span class="pill prod" style="background:${PCOLOR[r.p]}">${PLABEL[r.p]}</span></td><td>${fmt(r.pr)}</td><td>${fmt(r.c)}</td><td>${chgSpan(r.chg)}</td><td class="lbl">${signal}</td></tr>`;
  });
  hp+='</tbody></table>';
  const prodGrowthCount = prodGrowthRows.length;
  document.getElementById('foda-prodgrowth-table').innerHTML = hp;
  document.getElementById('sec-prodgrowth').style.display = prodGrowthCount>0 ? '' : 'none';

  // Top5 Sociedades Gerentes — evolución histórica
  const top5 = allTotals.slice(0,5);
  document.getElementById('sec-top5').style.display = top5.length? '' : 'none';
  if(top5.length) makeChart('ch-foda-top5', {
    type:'line',
    data:{labels:MONTHS.map(monthLabel), datasets: top5.map((r,i)=>({
      label:r.name, data: MONTHS.map(m=> r.ids.reduce((s,id)=>s+cpm_all(id,m),0)),
      borderColor: ['#22C55E','#00B4D8','#F4A100','#A855F7','#EC4899'][i], backgroundColor:'transparent', tension:.3, pointRadius:2
    }))},
    options:{responsive:true,maintainAspectRatio:false, scales:{y:moneyTick()}, plugins:{legend:{position:'bottom'}}}
  });
}

/* =========================================================
   ANÁLISIS DE ESCENARIO DE CRECIMIENTO — CAUCIÓN
   Cruce: facturación propia (aranceles) vs. informe 1816
   (Money Market ARS Clásicos, % Cau del patrimonio por Gerente)
   ========================================================= */
function fmtARSmm(n){
  if(n===null||n===undefined||isNaN(n)) return '—';
  return 'AR$ '+NF.format(Math.round(n))+' MM';
}
function scenarioShareTableHtml(baseMonthly, monthLbl){
  const scenarios = [
    {label:'Si caemos -10%', delta:-0.10, cls:'down'},
    {label:'Si caemos -5%', delta:-0.05, cls:'down'},
    {label:'Si ganamos +5%', delta:0.05, cls:'up'},
    {label:'Si ganamos +10%', delta:0.10, cls:'up'},
  ];
  let h = `<h3 class="subtitle">Impacto Mensual por Escenario de Crecimiento en Aranceles</h3>
  <p style="color:var(--txt-dim);font-size:11.5px;margin:-6px 0 12px;">Variación aplicada sobre el arancel del último mes (${monthLbl}: ${fmt(baseMonthly)}). Se muestra solo el incremento/decremento mensual estimado, no el nuevo total.</p>
  <div class="grid grid-4" style="margin-bottom:18px;">`;
  scenarios.forEach(s=>{
    const diff = baseMonthly * s.delta;
    h += `<div class="card kpi"><div class="label">${s.label} en aranceles</div><div class="value chg ${s.cls}" style="font-size:20px;">${s.delta>0?'▲ +':'▼ -'}${fmt(Math.abs(diff))}</div><div class="sub">por mes</div></div>`;
  });
  h += `</div>`;
  return h;
}
function renderCaucionGrowthScenario(){
  const host = document.getElementById('growth-scenario-Caucion');

  const rows = CROSS.caucion1816.map(r=>({

  }));

  const nuestroTotalCaucion = Object.values(CROSS.ourCaucionRevGrupo).reduce((a,b)=>a+b,0);
  const sinRelacion = rows.filter(r=>r.fact_caucion_usd===0 && !DISCONTINUED_GROUPS.has(r.grupo));
  const cesantes = rows.filter(r=>DISCONTINUED_GROUPS.has(r.grupo));
  const oportunidades = sinRelacion.slice().sort((a,b)=>b.caucionIndustriaMM-a.caucionIndustriaMM).slice(0,10);
  const top3 = Object.values(CROSS.ourCaucionRevGrupo).sort((a,b)=>b-a).slice(0,3).reduce((a,b)=>a+b,0);
  const concentracion = nuestroTotalCaucion>0? top3/nuestroTotalCaucion*100 : 0;

  let h = `<h2 class="section-title" style="margin-top:34px;">🎯 Análisis de Escenario de Crecimiento por Sociedad Gerente — Caución</h2>
  <p style="color:var(--txt-dim);font-size:12.5px;margin:-6px 0 16px;">Cruce entre nuestra facturación histórica de Caución y el <b>Informe 1816 — Industria FCI, Money Market ARS Clásicos</b> (rendimientos al 30/6/2026), que reporta para cada Gerente el % del patrimonio invertido en Cauciones (columna "Cau"). ${CROSS.meta.nota}</p>

  <div class="grid grid-4" style="margin-bottom:16px;">
    <div class="card kpi"><div class="label">Facturación Caución (histórico, todas las gerentes)</div><div class="value">${fmt(nuestroTotalCaucion)}</div></div>
    <div class="card kpi"><div class="label">Concentración Top 3 Gerentes</div><div class="value">${concentracion.toFixed(1)}%</div><div class="sub">Riesgo de dependencia</div></div>
    <div class="card kpi"><div class="label">Gerentes con caución en su AUM y SIN relación con nosotros</div><div class="value">${sinRelacion.length}</div><div class="sub">de ${rows.length} relevadas en el informe 1816</div></div>
    <div class="card kpi"><div class="label">Caución Industria Estimada (37 gerentes, Money Mkt ARS)</div><div class="value">${fmtARSmm(totalIndustriaMM)}</div></div>
  </div>

  ${scenarioShareTableHtml(sumProductPeriod('Caucion', LAST_MONTH), monthLabel(LAST_MONTH))}

  <div class="foda-grid" style="margin-bottom:18px;">
    <div class="foda-box foda-o">
      <h4 style="color:#7EC8FF;">📈 Dónde podemos crecer</h4>
      <ul>
        ${oportunidades.slice(0,6).map(r=>`<li><b>${r.grupo}</b> (${r.gerente}) — patrimonio ${fmtARSmm(r.patrimonio)}, ${r.cau}% en caución (≈${fmtARSmm(r.caucionIndustriaMM)}) y <b>facturación $0</b> con nosotros hoy.</li>`).join('')}
        <li>Sociedades donde ya operamos pero con volumen de caución bajo respecto a su patrimonio: <b>Lombard</b> (patrimonio ${fmtARSmm(1691513)}, 21% Cau, solo ${fmt(CROSS.ourCaucionRevGrupo['Lombard']||0)} facturados) y <b>Bancor Fondos SGFCISAU</b> (27% Cau, ${fmt(CROSS.ourCaucionRevGrupo['Bancor Fondos SGFCISAU']||0)}).</li>
      </ul>
    </div>
    <div class="foda-box foda-a">
      <h4 style="color:#FCA5A5;">⚠️ Amenazas</h4>
      <ul>
        <li>Concentración: <b>Top 3 gerentes explican ${concentracion.toFixed(1)}%</b> de la facturación de Caución — alta dependencia ante la salida de una de ellas.</li>
        ${cesantes.map(r=>`<li><b>${r.grupo}</b> está marcada ⛔ "Deja de operar" y representa ${fmt(r.fact_caucion_usd)} de facturación histórica en Caución en riesgo de pérdida total.</li>`).join('')}
        <li>Sociedades con alto % de Caución en su patrimonio (Vinci/Compass 30%, Bancor 27%, Parakeet 26%) donde tenemos participación baja o nula: el flujo probablemente lo está capturando la competencia.</li>
      </ul>
    </div>
  </div>

  <h3 class="subtitle">Detalle — Gerentes del Informe 1816 (Money Market ARS Clásicos) vs. Facturación Propia</h3>
  <div class="table-card"><div class="table-scroll"><table><thead><tr>
    <th class="lbl">Gerente (1816)</th><th class="lbl">Sociedad Gerente (nuestra base)</th>
    <th>Patrimonio FCI</th><th>% Cau</th><th>Caución Industria (est.)</th>
    <th>Nuestra Fact. Caución</th><th>Nuestra Fact. Futuros</th><th class="lbl">Diagnóstico</th>
  </tr></thead><tbody>
  ${rows.slice().sort((a,b)=>b.caucionIndustriaMM-a.caucionIndustriaMM).map(r=>{
    const cesante = DISCONTINUED_GROUPS.has(r.grupo);
    let diag;
    if(cesante) diag = discBadge();
    else if(r.fact_caucion_usd===0) diag = '<span class="badge down">🎯 Oportunidad</span>';
    else if(r.fact_caucion_usd>0 && r.caucionIndustriaMM>0 && (r.fact_caucion_usd/(r.caucionIndustriaMM/1000))<0.05) diag = '<span class="badge" style="color:#FBBF24;border-color:#FBBF24;">↗️ Subpenetrado</span>';
    else diag = '<span class="badge up">✅ Consolidado</span>';
    return `<tr><td class="lbl">${r.gerente}</td><td class="lbl">${r.grupo}</td><td>${fmtARSmm(r.patrimonio)}</td><td>${r.cau}%</td><td>${fmtARSmm(r.caucionIndustriaMM)}</td><td>${fmt(r.fact_caucion_usd)}</td><td>${fmt(r.fact_futuro_usd)}</td><td class="lbl">${diag}</td></tr>`;
  }).join('')}
  </tbody></table></div></div>`;

  host.innerHTML = h;
}

/* =========================================================
   ANÁLISIS DE ESCENARIO DE CRECIMIENTO — FUTUROS
   Cruce: facturación propia (aranceles) vs. stock real de
   futuros DLR por sociedad gerente y por plazo
   (Detalle de Carteras por Activo, 26/06/2026)
   ========================================================= */
const DISCONTINUED_GROUPS = new Set(['Pellegrini SASGFCI','Mercado Pago Asset Management S.A.']);
function renderFuturoStockScenario(){
  const host = document.getElementById('growth-scenario-Futuro');
  if(!host) return;

  const plazoLabels = Object.keys(CROSS.futPlazoTotal);
  const totalStock = Object.values(CROSS.futPlazoTotal).reduce((a,b)=>a+b,0) + (CROSS.futPlazoOtros||0);
  const cerca = (CROSS.futPlazoTotal['DLR062026']||0) + (CROSS.futPlazoTotal['DLR072026']||0);
  const pctCerca = totalStock>0? cerca/totalStock*100 : 0;

  const grupos = Object.keys(CROSS.futStockGrupo);
  const cross = grupos.map(g=>{
    const stock = CROSS.futStockGrupo[g]||0;
    const rev = CROSS.ourFuturoRevGrupo[g]||0;
    const ratio = stock>0? rev/(stock/1e6) : null; // USD facturados por cada millón ARS de stock
    return {grupo:g, stock, rev, ratio, cesante:DISCONTINUED_GROUPS.has(g)};
  }).sort((a,b)=>b.stock-a.stock);

  const oportunidades = cross.filter(r=>r.rev===0 && !r.cesante).slice(0,10);
  const subpenetrados = cross.filter(r=>r.rev>0 && r.ratio!==null && r.ratio<0.5 && !r.cesante).sort((a,b)=>a.ratio-b.ratio).slice(0,6);
  const fuertes = cross.filter(r=>r.ratio!==null && r.ratio>=1).sort((a,b)=>b.ratio-a.ratio).slice(0,6);
  const totalNuestraFact = Object.values(CROSS.ourFuturoRevGrupo).reduce((a,b)=>a+b,0);
  const cesanteConStock = cross.find(r=>r.cesante && r.stock>0);

  let h = `<h2 class="section-title" style="margin-top:34px;">🎯 Análisis de Stock por Plazo y por Sociedad Gerente — Futuros</h2>
  <p style="color:var(--txt-dim);font-size:12.5px;margin:-6px 0 16px;">Cruce entre nuestra facturación histórica de Futuros y el stock real de contratos de dólar futuro (Rofex, serie DLR) que mantiene cada Fondo, releído del <b>Detalle de Carteras por Activo al 26/06/2026</b>. Se excluye la pata de margen regulatorio ("Fut Reg ARS") y se toma el valor absoluto del nocional en cada contrato DLR.</p>

  <div class="grid grid-4" style="margin-bottom:16px;">
    <div class="card kpi"><div class="label">Stock Total Industria en Futuros DLR</div><div class="value">${fmtARSmm(totalStock/1e6)}</div></div>
    <div class="card kpi"><div class="label">Concentración en próximos 2 vencimientos</div><div class="value">${pctCerca.toFixed(0)}%</div><div class="sub">DLR062026 + DLR072026</div></div>
    <div class="card kpi"><div class="label">Sociedades con stock y SIN facturación con nosotros</div><div class="value">${oportunidades.length}</div><div class="sub">de ${cross.length} identificadas</div></div>
    <div class="card kpi"><div class="label">Nuestra Facturación Futuros (histórico)</div><div class="value">${fmt(totalNuestraFact)}</div></div>
  </div>

  ${scenarioShareTableHtml(sumProductPeriod('Futuro', LAST_MONTH), monthLabel(LAST_MONTH))}

  <div class="grid grid-2" style="margin-bottom:18px;">
    <div class="chart-card"><div class="ctitle">Stock Industria por Plazo (contratos DLR, ARS)</div><div class="chart-wrap"><canvas id="ch-futstock-plazo"></canvas></div></div>
    <div class="chart-card"><div class="ctitle">Top 12 Sociedades Gerentes por Stock de Futuros</div><div class="chart-wrap"><canvas id="ch-futstock-grupo"></canvas></div></div>
  </div>

  <div class="foda-grid" style="margin-bottom:18px;">
    <div class="foda-box foda-o">
      <h4 style="color:#7EC8FF;">📈 Dónde podemos crecer</h4>
      <ul>
        ${oportunidades.slice(0,6).map(r=>`<li><b>${r.grupo}</b> — stock de ${fmtARSmm(r.stock/1e6)} en contratos DLR y <b>facturación $0</b> con nosotros.</li>`).join('')}
        <li>El ${pctCerca.toFixed(0)}% del stock vence en los próximos dos meses (DLR062026/072026): alta rotación esperada → oportunidad de captar el flujo recurrente de "roll" en las sociedades donde ya operamos.</li>
      </ul>
    </div>
    <div class="foda-box foda-a">
      <h4 style="color:#FCA5A5;">⚠️ Amenazas</h4>
      <ul>
        ${subpenetrados.map(r=>`<li><b>${r.grupo}</b> — stock de ${fmtARSmm(r.stock/1e6)} pero solo ${fmt(r.rev)} facturados: probable captura del flujo por la competencia.</li>`).join('')}
        ${cesanteConStock? `<li><b>${cesanteConStock.grupo}</b> está marcada ⛔ "Deja de operar" y mantiene stock de ${fmtARSmm(cesanteConStock.stock/1e6)} en futuros — facturación futura en riesgo.</li>` : ''}
        <li>Datos no identificados: ${fmtARSmm((CROSS.futPlazoOtros||0)/1e6)} en fondos no mapeados a una sociedad gerente conocida (aprox. 15% del stock total) — posible zona ciega de competidores fuera de nuestra base.</li>
      </ul>
    </div>
  </div>

  <h3 class="subtitle">Fortalezas — Sociedades mejor monetizadas (facturación por millón ARS de stock)</h3>
  <div class="table-card" style="margin-bottom:18px;"><div class="table-scroll"><table><thead><tr>
    <th class="lbl">Sociedad Gerente</th><th>Stock Futuros</th><th>Nuestra Fact. Futuros</th><th>Ratio USD / MM ARS stock</th>
  </tr></thead><tbody>
  ${fuertes.map(r=>`<tr><td class="lbl">${r.grupo}</td><td>${fmtARSmm(r.stock/1e6)}</td><td>${fmt(r.rev)}</td><td>${r.ratio.toFixed(2)}</td></tr>`).join('')}
  </tbody></table></div></div>

  <h3 class="subtitle">Detalle Completo — Stock por Sociedad Gerente vs. Facturación Propia</h3>
  <div class="table-card"><div class="table-scroll"><table><thead><tr>
    <th class="lbl">Sociedad Gerente</th><th>Stock Futuros DLR</th><th>Nuestra Fact. Futuros</th><th>Ratio</th><th class="lbl">Diagnóstico</th>
  </tr></thead><tbody>
  ${cross.map(r=>{
    let diag;
    if(r.cesante) diag = discBadge();
    else if(r.rev===0) diag = '<span class="badge down">🎯 Oportunidad</span>';
    else if(r.ratio!==null && r.ratio<0.5) diag = '<span class="badge" style="color:#FBBF24;border-color:#FBBF24;">↗️ Subpenetrado</span>';
    else diag = '<span class="badge up">✅ Consolidado</span>';
    return `<tr><td class="lbl">${r.grupo}</td><td>${fmtARSmm(r.stock/1e6)}</td><td>${fmt(r.rev)}</td><td>${r.ratio!==null?r.ratio.toFixed(2):'—'}</td><td class="lbl">${diag}</td></tr>`;
  }).join('')}
  </tbody></table></div></div>`;

  host.innerHTML = h;

  makeChart('ch-futstock-plazo', {
    type:'bar',
    data:{labels:plazoLabels, datasets:[{label:'Stock (ARS)', data:plazoLabels.map(p=>CROSS.futPlazoTotal[p]), backgroundColor:'#F4A100CC', borderRadius:3}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:moneyTick()}}
  });
  const top12 = cross.slice(0,12);
  makeChart('ch-futstock-grupo', {
    type:'bar',
    data:{labels:top12.map(r=>r.grupo.length>24?r.grupo.slice(0,24)+'…':r.grupo), datasets:[{label:'Stock Futuros', data:top12.map(r=>r.stock), backgroundColor:'#F4A100CC', borderRadius:3}]},
    options:{responsive:true,maintainAspectRatio:false, indexAxis:'y', scales:{x:moneyTick()}, plugins:{legend:{display:false}}}
  });
}

/* =========================================================
   NAV & INIT
   ========================================================= */
function buildSidebarProducts(){
  const host = document.getElementById('sb-products');
  host.innerHTML = MAIN_PRODUCTS.map(p=>`<div class="navitem" data-tab="${p}"><span class="dot" style="background:${PCOLOR[p]}"></span>${PLABEL[p]}</div>`).join('');
}
function buildProductPanels(){
  const host = document.getElementById('tab-products-host');
  host.innerHTML = MAIN_PRODUCTS.map(p=>`<div id="tab-${p}" class="tabpanel"></div>`).join('');
}

const renderedTabs = new Set();
function activateTab(tab){
  document.querySelectorAll('.navitem').forEach(n=>n.classList.toggle('active', n.dataset.tab===tab));
  document.querySelectorAll('.tabpanel').forEach(p=>p.classList.remove('active'));
  const panel = document.getElementById('tab-'+tab);
  panel.classList.add('active');
  if(!renderedTabs.has(tab)){
    if(tab==='resumen') renderResumen();
    else if(tab==='grupos') renderGrupos();
    else if(tab==='rankings') renderRankings();
    else if(tab==='foda') renderFoda();
    else if(MAIN_PRODUCTS.includes(tab)) renderProductTab(tab);
    renderedTabs.add(tab);
  }
}

function init(){
  document.getElementById('sb-range').textContent = monthLabel(MONTHS[0])+' – '+monthLabel(LAST_MONTH);
  buildSidebarProducts();
  buildProductPanels();
  document.querySelectorAll('.navitem').forEach(n=>n.addEventListener('click', ()=>activateTab(n.dataset.tab)));
  activateTab('resumen');
}
init();

</script>
</body>
</html>
